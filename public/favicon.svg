  <path d="M22 12H27V17" stroke="#141415" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Arrow Inner Fill (Thinner Peach Stroke) -->
  <path d="M4 20L16 11L22 18L27 12" stroke="#FFA69E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M22 12H27V17" stroke="#FFA69E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
