  <!-- Panel 2 (Light Sage) -->
  <path d="M10 12L16 7V21L10 26Z" fill="#D9E2C5" stroke="#141415" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Panel 3 (Medium Sage) -->
